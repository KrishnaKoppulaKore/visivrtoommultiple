<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        .upload-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .upload-container h2 {
            font-size: 28px;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .upload-container p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .file-upload {
            border: 2px dashed #94a3b8;
            border-radius: 14px;
            padding: 35px 20px;
            transition: 0.3s;
            cursor: pointer;
            background: #f8fafc;
        }

        .file-upload:hover {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .file-upload input {
            display: none;
        }

        .file-upload label {
            cursor: pointer;
            color: #2563eb;
            font-weight: 600;
            font-size: 16px;
        }

        .file-name {
            margin-top: 15px;
            font-size: 14px;
            color: #334155;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>Upload Image</h2>
        <p>Please upload your image to continue</p>

        <form action="/submit-form" method="POST" enctype="multipart/form-data">

            <!-- Hidden Fields -->
            <input type="hidden" name="request_id" id="request_id">

            <!-- Hidden values as space -->
            <input type="hidden" name="name" value=" ">
            <input type="hidden" name="age" value=" ">
            <input type="hidden" name="problem" value=" ">

            <!-- File Upload -->
            <div class="file-upload">
                <input 
                    type="file" 
                    name="image" 
                    id="imageUpload"
                    accept="image/*"
                    required
                />

                <label for="imageUpload">
                    Click to Choose Image
                </label>

                <div class="file-name" id="fileName">
                    No file selected
                </div>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        // Get request_id from URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById("request_id").value =
            params.get("request_id");

        // Show selected file name
        const imageInput = document.getElementById("imageUpload");
        const fileName = document.getElementById("fileName");

        imageInput.addEventListener("change", function () {
            if (this.files.length > 0) {
                fileName.textContent = this.files[0].name;
            } else {
                fileName.textContent = "No file selected";
            }
        });
    </script>

</body>
</html>
