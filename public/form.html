<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Toom Image Upload</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background:
                linear-gradient(
                    135deg,
                    #cc0000,
                    #990000
                );

            padding: 20px;
        }

        .upload-container {

            width: 100%;
            max-width: 450px;

            background: #ffffff;

            padding: 40px 30px;

            border-radius: 18px;

            box-shadow:
                0 15px 40px
                rgba(0, 0, 0, 0.25);

            text-align: center;
        }

        .logo {

            width: 150px;

            margin-bottom: 25px;
        }

        .upload-container h2 {

            font-size: 28px;

            color: #111827;

            margin-bottom: 10px;
        }

        .upload-container p {

            color: #6b7280;

            font-size: 14px;

            margin-bottom: 30px;
        }

        .file-upload {

            border:
                2px dashed #cc0000;

            border-radius: 14px;

            padding: 35px 20px;

            transition: 0.3s;

            cursor: pointer;

            background: #fff5f5;
        }

        .file-upload:hover {

            border-color: #990000;

            background: #ffe5e5;
        }

        .file-upload input {
            display: none;
        }

        .file-upload label {

            cursor: pointer;

            color: #cc0000;

            font-weight: 700;

            font-size: 16px;
        }

        .file-name {

            margin-top: 18px;

            font-size: 14px;

            color: #374151;

            line-height: 1.6;

            max-height: 160px;

            overflow-y: auto;

            word-break: break-word;
        }

        button {

            width: 100%;

            margin-top: 25px;

            padding: 14px;

            border: none;

            border-radius: 12px;

            background: #cc0000;

            color: white;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            background: #990000;
        }

        .note {

            margin-top: 15px;

            font-size: 12px;

            color: #6b7280;
        }

    </style>
</head>

<body>

    <div class="upload-container">

        <!-- Toom Logo -->
        <img
            src="https://demo.kore.ai/images/fileupload/fileupload/upload/toom9192cropped.jpg"
            alt="Toom Logo"
            class="logo"
        />

        <h2>Upload Plant Images</h2>

        <p>
            Please upload one or more plant images to continue
        </p>

        <form
            action="/submit-form"
            method="POST"
            enctype="multipart/form-data"
        >

            <!-- Hidden Fields -->
            <input
                type="hidden"
                name="request_id"
                id="request_id"
            >

            <input
                type="hidden"
                name="name"
                value=" "
            >

            <input
                type="hidden"
                name="age"
                value=" "
            >

            <input
                type="hidden"
                name="problem"
                value=" "
            >

            <!-- File Upload -->
            <div class="file-upload">

                <input
                    type="file"
                    name="images"
                    id="imageUpload"
                    accept="image/*"
                    required
                    multiple
                />

                <label for="imageUpload">
                    Click to Choose Images
                </label>

                <div
                    class="file-name"
                    id="fileName"
                >
                    No files selected
                </div>

            </div>

            <div class="note">
                Multiple image upload supported
            </div>

            <button type="submit">
                Submit
            </button>

        </form>

    </div>

    <script>

        /**
         * Get request_id from URL
         */
        const params =
            new URLSearchParams(
                window.location.search
            );

        document.getElementById(
            "request_id"
        ).value =
            params.get("request_id");

        /**
         * File display logic
         */
        const imageInput =
            document.getElementById(
                "imageUpload"
            );

        const fileName =
            document.getElementById(
                "fileName"
            );

        imageInput.addEventListener(
            "change",

            function () {

                if (
                    this.files.length > 0
                ) {

                    const names = [];

                    for (
                        let i = 0;
                        i < this.files.length;
                        i++
                    ) {

                        names.push(
                            `${i + 1}. ${this.files[i].name}`
                        );
                    }

                    fileName.innerHTML =
                        names.join("<br>");

                } else {

                    fileName.textContent =
                        "No files selected";
                }
            }
        );

    </script>

</body>
</html>
